run_name: "random_forest"
run_id: "002"
description: "Random forest ensemble classifier"

model:
  type: "RandomForestClassifier"
  params:
    n_estimators: 100
    random_state: 42

data:
  source: "sklearn_iris"
  train_split: 0.8
  test_split: 0.2
  seed: 42

evaluation:
  metrics:
    - accuracy
    - f1
    - precision
    - recall
  primary_metric: accuracy
  primary_mode: max

compute:
  device: cpu

mlflow:
  experiment_name: "iris-classifier"
  tags:
    phase: "4"
    iteration: "1"
