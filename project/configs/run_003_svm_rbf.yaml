run_name: "svm_rbf"
run_id: "003"
description: "Support Vector Machine with RBF kernel"

model:
  type: "SVC"
  params:
    kernel: "rbf"
    C: 1.0
    gamma: "scale"
    random_state: 42

data:
  source: "sklearn_iris"
  train_split: 0.8
  test_split: 0.2
  seed: 42

evaluation:
  metrics:
    - accuracy
    - f1
    - precision
    - recall
  primary_metric: accuracy
  primary_mode: max

compute:
  device: cpu

mlflow:
  experiment_name: "iris-classifier"
  tags:
    phase: "4"
    iteration: "1"
